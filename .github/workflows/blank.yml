name: Build EPG Files

# ---------------------------------------------------------
# 트리거 변경: 매일 오후 2시 (UTC 기준)에 실행되도록 설정
# Cron 표현식: '0 14 * * *' -> 매일 14시 0분
# 참고: GitHub Actions의 Cron은 UTC를 기준으로 합니다. 한국 시간(KST) 오후 2시가 목표라면,
# UTC 기준으로는 오전 6시여야 합니다. (KST = UTC + 9시간)
# 따라서, KST 오후 2시를 원하시면 UTC 오전 6시에 설정하세요.
# 예: KST 오후 2시 = UTC 오전 6시 -> '0 6 * * *'
on:
  schedule:
    # KST 오후 2시 (UTC 오전 6시)에 실행하려면 아래를 사용하세요.
    - cron: '0 6 * * *' 

# workflow_dispatch는 제거하여 자동 실행만 남김
# ---------------------------------------------------------

jobs:
  build_epg:
    runs-on: ubuntu-latest
    steps:
      # 1. 코드 체크아웃
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Python 환경 설정 및 종속성 설치
      - name: Set up Python and install dependencies
        run: |
          python3 --version
          pip install "epg2xml[all] @ git+https://github.com/epg2xml/epg2xml.git"
        id: install

      # 3. 파일 정리 (기존 파일 삭제)
      - name: Clean up old files
        run: |
          echo "Cleaning up previous EPG files..."
          rm -f kr_epg.xml kr_epg.xml.gz

      # 4. EPG 파일 생성 (핵심 실행 단계)
      - name: Generate new EPG files
        run: |
          echo "Running epg2xml to generate kr_epg.xml and compressing it..."
          # 요청하신 명령어 실행: XML 생성 후 gzip으로 압축하여 .gz 파일 생성
          python -m epg2xml run --config epg2xml.json --channelfile Channel.json --xmlfile kr_epg.xml && gzip -c kr_epg.xml > kr_epg.xml.gz

      # 5. 변경 사항 커밋 및 푸시
      - name: Commit and Push changes
        run: |
          echo "Staging, committing, and pushing changes to the repository..."
          git config --global user.name "github-actions[bot]"
          git config --global user.email "actions@github.com"
          git add kr_epg.xml kr_epg.xml.gz
          git commit -m "epg update"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
